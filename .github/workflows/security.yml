name: Security checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: DevSecOps security gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Install Python security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit semgrep

      - name: Run Gitleaks secrets scan
        id: gitleaks
        continue-on-error: true
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.24.2 detect --source /repo --no-git --redact --report-format json --report-path /repo/reports/gitleaks.json

      - name: Mark Gitleaks result
        if: steps.gitleaks.outcome == 'failure'
        run: echo "gitleaks" >> reports/security-gate.failures

      - name: Run Bandit SAST
        id: bandit
        continue-on-error: true
        run: bandit -r app -f json -o reports/bandit.json

      - name: Mark Bandit result
        if: steps.bandit.outcome == 'failure'
        run: echo "bandit" >> reports/security-gate.failures

      - name: Run Semgrep SAST
        id: semgrep
        continue-on-error: true
        run: semgrep scan --config auto --error --json --output reports/semgrep.json app

      - name: Mark Semgrep result
        if: steps.semgrep.outcome == 'failure'
        run: echo "semgrep" >> reports/security-gate.failures

      - name: Run pip-audit SCA
        id: pip_audit
        continue-on-error: true
        run: pip-audit -r requirements.txt --format json --output reports/pip-audit.json

      - name: Mark pip-audit result
        if: steps.pip_audit.outcome == 'failure'
        run: echo "pip-audit" >> reports/security-gate.failures

      - name: Build Docker image
        run: docker build -t devsecops-nir:${{ github.sha }} .

      - name: Run Trivy image scan
        id: trivy_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devsecops-nir:${{ github.sha }}
          format: json
          output: reports/trivy-image.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Mark Trivy image result
        if: steps.trivy_image.outcome == 'failure'
        run: echo "trivy-image" >> reports/security-gate.failures

      - name: Run Trivy config scan
        id: trivy_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: reports/trivy-config.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Mark Trivy config result
        if: steps.trivy_config.outcome == 'failure'
        run: echo "trivy-config" >> reports/security-gate.failures

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/
          if-no-files-found: warn

      - name: Security gate
        if: always()
        run: |
          if [ -s reports/security-gate.failures ]; then
            echo "Security gate blocked the build. Failed checks:"
            cat reports/security-gate.failures
            exit 1
          fi
          echo "Security gate passed. No blocking findings were detected."
